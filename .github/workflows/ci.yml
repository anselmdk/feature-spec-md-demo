name: CI

on: [push, pull_request]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Allow npm to install private GitHub dependency
        run: |
          git config --global url."https://x-access-token:${{ secrets.FEATURE_SPEC_MD_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git config --global url."https://x-access-token:${{ secrets.FEATURE_SPEC_MD_TOKEN }}@github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://x-access-token:${{ secrets.FEATURE_SPEC_MD_TOKEN }}@github.com/".insteadOf "git@github.com:"
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - run: npm run verify
