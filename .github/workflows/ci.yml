name: CI

on: [push, pull_request]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm run spec:check
      - run: npm run spec:coverage
      - run: node scripts/assert-spec-coverage.mjs
      - run: npm run test:unit
      - run: npm run test:e2e
      - name: Generate feature spec report
        id: spec_report
        if: always()
        shell: bash
        run: |
          set +e
          npm run spec:report
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" -eq 0 ]; then
            {
              echo "## Feature Spec Evidence"
              echo ""
              echo "✅ Declared screenshot evidence is complete."
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Feature Spec Evidence"
              echo ""
              echo "❌ Declared screenshot evidence is incomplete."
              echo ""
              echo "The HTML report is still published below for inspection."
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          exit 0
      - name: Publish feature spec report
        if: always() && hashFiles('test-results/spec-report/index.html') != ''
        run: npx feature-spec-md github-report --publish ftp --report-dir test-results/spec-report
        env:
          FEATURE_SPEC_FTP_HOST: ${{ vars.FEATURE_SPEC_FTP_HOST }}
          FEATURE_SPEC_FTP_USER: ${{ vars.FEATURE_SPEC_FTP_USER }}
          FEATURE_SPEC_FTP_REMOTE_DIR: ${{ vars.FEATURE_SPEC_FTP_REMOTE_DIR }}
          FEATURE_SPEC_REPORT_BASE_URL: ${{ vars.FEATURE_SPEC_REPORT_BASE_URL }}
          FEATURE_SPEC_FTP_PASSWORD: ${{ secrets.FEATURE_SPEC_FTP_PASSWORD }}
      - name: Fail on feature spec evidence errors
        if: always() && steps.spec_report.outputs.status != '0'
        run: exit 1
