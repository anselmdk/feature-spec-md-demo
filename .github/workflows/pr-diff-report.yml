name: PR diff report

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:
    inputs:
      pr-number:
        description: Pull request number to generate a diff report for
        required: true
        type: number

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  diff-report:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.event == 'pull_request' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.pull_requests[0]
      )
    uses: anselmdk/feature-spec-md/.github/workflows/consuming-project-feature-spec-pr-diff-report.yml@main
    with:
      pr-number: ${{ github.event_name == 'workflow_dispatch' && inputs.pr-number || github.event.workflow_run.pull_requests[0].number }}
    secrets: inherit
