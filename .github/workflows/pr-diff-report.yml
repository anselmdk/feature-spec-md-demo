name: PR diff report

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  issues: write

defaults:
  run:
    shell: bash

jobs:
  diff-report:
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.pull_requests[0]
    runs-on: ubuntu-latest
    steps:
      - name: Check whether code or specs changed
        id: changes
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.workflow_run.pull_requests[0];
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });
            const relevant = files.some((file) => {
              const name = file.filename;
              return (
                /^(src|specs|tests|scripts|public)\//.test(name) ||
                /^package(-lock)?\.json$/.test(name) ||
                /^vite\.config\./.test(name) ||
                /^playwright\.config\./.test(name) ||
                /^tsconfig.*\.json$/.test(name) ||
                /\.(model|feature|stack|design)\.md$/.test(name)
              );
            });
            core.setOutput('changed', relevant ? 'true' : 'false');
            core.setOutput('pr-number', String(pr.number));

      - name: Find latest main build
        id: main_build
        if: steps.changes.outputs.changed == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: context.payload.workflow_run.workflow_id,
              branch: 'main',
              status: 'success',
              event: 'push',
              per_page: 20,
            });
            const latest = runs.find((run) => run.run_number < context.payload.workflow_run.run_number);
            core.setOutput('build-number', latest ? String(latest.run_number) : '');

      - uses: actions/checkout@v4
        if: steps.changes.outputs.changed == 'true'
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        if: steps.changes.outputs.changed == 'true'
        with:
          node-version: 24

      - run: npm install
        if: steps.changes.outputs.changed == 'true'

      - name: Publish PR diff report
        id: diff_report
        if: steps.changes.outputs.changed == 'true'
        run: npx feature-spec-md github-diff-report --publish ftp
        env:
          FEATURE_SPEC_BUILD_NUMBER: ${{ github.event.workflow_run.run_number }}
          FEATURE_SPEC_BASE_BUILD_NUMBER: ${{ steps.main_build.outputs.build-number }}
          FEATURE_SPEC_PR_NUMBER: ${{ steps.changes.outputs.pr-number }}
          FEATURE_SPEC_FTP_HOST: ${{ vars.FEATURE_SPEC_FTP_HOST }}
          FEATURE_SPEC_FTP_USER: ${{ vars.FEATURE_SPEC_FTP_USER }}
          FEATURE_SPEC_FTP_REMOTE_DIR: ${{ vars.FEATURE_SPEC_FTP_REMOTE_DIR }}
          FEATURE_SPEC_REPORT_BASE_URL: ${{ vars.FEATURE_SPEC_REPORT_BASE_URL }}
          FEATURE_SPEC_FTP_PASSWORD: ${{ secrets.FEATURE_SPEC_FTP_PASSWORD }}

      - name: Comment on PR
        if: steps.changes.outputs.changed == 'true' && steps.diff_report.outputs.diff-report-url != ''
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = Number('${{ steps.changes.outputs.pr-number }}');
            const body = ${{ toJson(steps.diff_report.outputs.diff-comment-body) }};
            const marker = '<!-- feature-spec-md-pr-diff -->';
            const buildNumber = String(context.payload.workflow_run.run_number);
            const baseBuildNumber = '${{ steps.main_build.outputs.build-number }}';
            const timestamp = new Date().toISOString();
            const runUrl = context.payload.workflow_run.html_url;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const previous = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );
            const lines = [];
            lines.push('### PR build ' + buildNumber + ' - ' + timestamp);
            lines.push('');
            lines.push(baseBuildNumber ? 'Base: main build ' + baseBuildNumber : 'Base: previous build fallback');
            lines.push('CI run: [#' + buildNumber + '](' + runUrl + ')');
            lines.push('');
            lines.push(body);
            const entry = lines.join('\n');
            const nextBody = previous
              ? previous.body + '\n\n---\n\n' + entry
              : marker + '\n## Feature spec PR diff history\n\n' + entry;
            if (previous) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: previous.id,
                body: nextBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: nextBody,
              });
            }
